services:
  db:
    image: postgres:16-alpine
    container_name: employee-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: employeedb
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
